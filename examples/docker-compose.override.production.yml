# docker-compose.override.production.yml
# Para ambiente de producción
version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.production
    environment:
      DJANGO_DEBUG: "False"
      LOG_LEVEL: WARNING
      LOG_ENVIRONMENT: production
      LOG_CONSOLE: "false"  # No logs en consola en producción
      LOG_JSON: "true"      # Solo JSON estructurado
      LOG_FILE: "true"
      POSTGRES_ENABLED: "true"
      # Seguridad máxima en producción
      DJANGO_SECURE_SSL_REDIRECT: "True"
      DJANGO_SESSION_COOKIE_SECURE: "True"
      DJANGO_CSRF_COOKIE_SECURE: "True"
      DJANGO_SECURE_HSTS_SECONDS: "31536000"
      DJANGO_SECURE_HSTS_INCLUDE_SUBDOMAINS: "True"
      DJANGO_SECURE_HSTS_PRELOAD: "True"
    deploy:
      replicas: 4
      update_config:
        parallelism: 2
        delay: 10s
        order: start-first
      rollback_config:
        parallelism: 2
        delay: 10s
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '1.0'
          memory: 1G
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  postgres:
    environment:
      POSTGRES_MAX_CONNECTIONS: 200
      POSTGRES_SHARED_BUFFERS: 256MB
      POSTGRES_EFFECTIVE_CACHE_SIZE: 1GB
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Backups automáticos
      - postgres_backups:/backups
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '1.0'
          memory: 2G
    restart: always

  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 1gb --maxmemory-policy allkeys-lru --appendonly yes
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
    restart: always

  # Nginx con SSL en producción
  nginx:
    environment:
      - NGINX_WORKER_PROCESSES=auto
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    restart: always

volumes:
  postgres_backups:
