# docker-compose.override.staging.yml
# Para ambiente de staging
version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.staging
    environment:
      DJANGO_DEBUG: "False"
      LOG_LEVEL: INFO
      LOG_ENVIRONMENT: staging
      LOG_CONSOLE: "true"
      LOG_JSON: "true"
      LOG_FILE: "true"
      POSTGRES_ENABLED: "true"
      # Configuraciones específicas de staging
      DJANGO_SECURE_SSL_REDIRECT: "True"
      DJANGO_SESSION_COOKIE_SECURE: "True"
      DJANGO_CSRF_COOKIE_SECURE: "True"
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
    restart: always

  postgres:
    environment:
      POSTGRES_MAX_CONNECTIONS: 100
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G

  # Agregar Redis para caché en staging
  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    deploy:
      resources:
        limits:
          memory: 512M
